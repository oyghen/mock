[project]
name = "mockcli"
version = "0.4.3"
description = "mock cli app"
readme = "README.md"
authors = [
    { name = "oyghen", email = "oyghen@duck.com" }
]
requires-python = ">=3.11"
dependencies = [
    "mocklib==0.4.3",
    "typer>=0.24.1",
]

[tool.uv.sources]
mocklib = { workspace = true }

[project.scripts]
mockcli = "mockcli.cli:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
