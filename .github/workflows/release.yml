name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish library and CLI app to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install

      - name: Sync workspace
        run: uv sync --locked --all-packages --all-extras

      - name: Build all packages
        run: uv build --no-sources --all-packages

      - name: Smoke test (wheel)
        run: |
          set -euo pipefail

          uv run --isolated --no-project \
            --with dist/mocklib-*.whl \
            packages/mocklib/tests/smoke_test_lib.py

          uv run --isolated --no-project \
            --with dist/mocklib-*.whl \
            --with dist/mockcli-*.whl \
            packages/mockcli/tests/smoke_test_cli.py

      - name: Smoke test (source distribution)
        run: |
          set -euo pipefail

          uv run --isolated --no-project \
            --with dist/mocklib-*.tar.gz \
            packages/mocklib/tests/smoke_test_lib.py

          uv run --isolated --no-project \
            --with dist/mocklib-*.tar.gz \
            --with dist/mockcli-*.tar.gz \
            packages/mockcli/tests/smoke_test_cli.py

      - name: Publish all packages
        run: uv publish
