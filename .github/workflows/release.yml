name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  mocklib:
    name: Build and publish library
    runs-on: ubuntu-latest
    environment:
      name: pypi-lib
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv python install
      - run: uv sync --locked --all-extras --package mocklib
      - run: uv build
      - run: uv publish

  mockcli:
    name: Build and publish cli app
    runs-on: ubuntu-latest
    needs: mocklib
    environment:
      name: pypi-cli
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv python install
      - run: uv sync --locked --all-extras --package mocklib
      - run: uv build --no-sources
      - run: uv publish
